<html lang="en">
<head>

<title>INHEART Dashboard Demo Hub — Q1 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #1e2d45;
  --blue-mid: #3a7a45;
  --blue-light: #4a9458;
  --blue-pale: #7ab8a0;
  --blue-frost: #eef4f0;
  --teal: #2a6038;
  --amber: #b07d2a;
  --red: #c0392b;
  --green: #3a7a45;
  --purple: #2a4060;
  --slate-50: #f4f6f9;
  --slate-100: #eef2f7;
  --slate-200: #dce6df;
  --text-primary: #1a2233;
  --text-secondary: #4a6080;
  --text-muted: #6a8099;
  --border: rgba(58,122,69,0.14);
  --shadow-sm: 0 1px 4px rgba(20,40,30,0.08), 0 0 0 1px rgba(58,122,69,0.07);
  --shadow-md: 0 4px 20px rgba(20,40,30,0.12), 0 0 0 1px rgba(58,122,69,0.09);
  --shadow-lg: 0 8px 40px rgba(20,40,30,0.15), 0 0 0 1px rgba(58,122,69,0.11);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--slate-50); color: var(--text-primary); }

/* ─── TOPBAR ─────────────────────────────────────────────── */
.topbar {
  position: sticky; top: 0; z-index: 200;
  background: rgba(20,32,54,.97); height: 56px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 28px; box-shadow: 0 2px 12px rgba(0,0,0,0.3);
}
.topbar-left { display: flex; align-items: center; gap: 14px; }
.logo-mark {
  width: 34px; height: 34px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 800; color: #fff;
  background: linear-gradient(135deg, #3a7a45, #1e2d45);
}
.brand-name { font-size: 15px; font-weight: 700; color: #fff; }
.brand-sub { font-size: 11px; color: #8BA3C4; margin-top: 1px; }
.topbar-right { display: flex; align-items: center; gap: 14px; }
.period-badge {
  background: rgba(58,122,69,0.2); color: #6fc880;
  font-size: 11px; font-weight: 600; padding: 4px 10px;
  border-radius: 20px; font-family: 'DM Mono', monospace;
  border: 1px solid rgba(58,122,69,0.35);
}
.live-dot {
  width: 8px; height: 8px; border-radius: 50%; background: #6fc880;
  box-shadow: 0 0 0 3px rgba(26,173,111,0.25); animation: pulse 2s infinite;
}
.live-label { font-size: 11px; color: #6fc880; font-weight: 500; }
@keyframes pulse {
  0%,100% { box-shadow: 0 0 0 3px rgba(26,173,111,0.25); }
  50% { box-shadow: 0 0 0 6px rgba(26,173,111,0.10); }
}
.back-btn {
  display: none; align-items: center; gap: 6px;
  background: rgba(58,122,69,0.15); border: 1px solid rgba(58,122,69,0.3);
  color: #fff; font-size: 12px; font-weight: 500;
  padding: 6px 14px; border-radius: 8px; cursor: pointer;
  transition: all 0.15s;
}
.back-btn:hover { background: rgba(255,255,255,0.18); }
.back-btn.visible { display: flex; }
.home-link {
  display: inline-flex; align-items: center; gap: 6px;
  text-decoration: none;
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
  color: #fff; font-size: 12px; font-weight: 500;
  padding: 6px 14px; border-radius: 8px;
  transition: all 0.15s;
}
.home-link:hover { background: rgba(255,255,255,0.18); border-color: rgba(255,255,255,0.3); }

/* ─── HUB VIEW ────────────────────────────────────────────── */
#hub-view { padding: 28px 28px 48px; }

.hub-header { margin-bottom: 28px; }
.hub-title { font-size: 24px; font-weight: 700; color: var(--text-primary); }
.hub-subtitle { font-size: 13px; color: var(--text-muted); margin-top: 5px; }
.hub-stats {
  display: flex; gap: 24px; margin-top: 16px;
  padding: 14px 20px; background: #fff;
  border-radius: 12px; box-shadow: var(--shadow-sm);
  border: 1px solid var(--border); width: fit-content;
}
.hub-stat { text-align: center; }
.hub-stat-val { font-size: 20px; font-weight: 700; font-family: 'DM Mono', monospace; color: var(--blue-mid); }
.hub-stat-lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.7px; color: var(--text-muted); margin-top: 2px; }

.section-header {
  display: flex; align-items: center; justify-content: space-between;
  margin: 24px 0 14px;
}
.section-label {
  display: flex; align-items: center; gap: 8px;
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.8px; color: var(--text-secondary);
}
.section-accent { width: 3px; height: 14px; background: var(--blue-mid); border-radius: 2px; }

/* ─── CARD GRID ────────────────────────────────────────────── */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 18px;
}

.dash-card {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 16px;
  box-shadow: var(--shadow-sm);
  overflow: hidden;
  transition: transform 0.18s, box-shadow 0.18s;
  cursor: pointer;
  position: relative;
}
.dash-card:hover {
  transform: translateY(-3px);
  box-shadow: var(--shadow-lg);
}
.dash-card:hover .card-preview { filter: brightness(1.03); }
.dash-card:hover .open-arrow { opacity: 1; transform: translateX(0); }

/* Color accent bar */
.card-accent {
  position: absolute; top: 0; left: 0; right: 0; height: 4px;
  border-radius: 16px 16px 0 0;
}

/* Preview thumbnail area */
.card-preview {
  position: relative;
  height: 170px;
  overflow: hidden;
  background: var(--slate-100);
  display: flex; align-items: center; justify-content: center;
  transition: filter 0.18s;
}
.preview-icon {
  font-size: 56px;
  opacity: 0.85;
  filter: drop-shadow(0 4px 12px rgba(0,0,0,0.12));
}
.preview-bg {
  position: absolute; inset: 0;
  opacity: 0.06;
  background-image:
    repeating-linear-gradient(45deg, currentColor 0, currentColor 1px, transparent 0, transparent 50%);
  background-size: 12px 12px;
}
.preview-kpi-row {
  position: absolute; bottom: 10px; left: 10px; right: 10px;
  display: flex; gap: 6px;
}
.mini-kpi {
  flex: 1; background: rgba(255,255,255,0.92);
  border-radius: 8px; padding: 6px 8px;
  backdrop-filter: blur(4px);
}
.mini-kpi-val { font-size: 12px; font-weight: 700; font-family: 'DM Mono', monospace; color: var(--text-primary); }
.mini-kpi-lbl { font-size: 9px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-top: 1px; }
.mini-delta { font-size: 9px; font-weight: 600; font-family: 'DM Mono', monospace; }
.mini-delta.up { color: var(--green); }
.mini-delta.dn { color: var(--red); }

/* Open arrow */
.open-arrow {
  position: absolute; top: 12px; right: 12px;
  width: 30px; height: 30px; border-radius: 50%;
  background: rgba(30,111,217,0.12); color: var(--teal);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; opacity: 0; transform: translateX(4px);
  transition: all 0.18s;
}

/* Card body */
.card-body { padding: 14px 16px 16px; }
.card-number {
  display: inline-block;
  font-size: 10px; font-weight: 700; font-family: 'DM Mono', monospace;
  color: var(--text-muted); background: var(--slate-100);
  padding: 2px 6px; border-radius: 4px; margin-bottom: 6px;
}
.card-title { font-size: 14px; font-weight: 700; color: var(--text-primary); margin-bottom: 3px; }
.card-desc { font-size: 11px; color: var(--text-muted); line-height: 1.5; }
.card-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
.tag {
  font-size: 10px; font-weight: 500; padding: 2px 8px;
  border-radius: 20px; background: var(--blue-frost); color: var(--teal);
}

/* Click prompt */
.click-prompt {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--slate-200);
}
.click-prompt-text { font-size: 11px; color: var(--text-muted); }
.click-prompt-btn {
  font-size: 11px; font-weight: 600; color: var(--teal);
  display: flex; align-items: center; gap: 4px;
}

/* ─── DETAIL VIEW ─────────────────────────────────────────── */
#detail-view {
  display: none;
  flex-direction: column;
  height: calc(100vh - 56px);
}
#detail-view.visible { display: flex; }

.detail-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 20px; background: #fff;
  border-bottom: 1px solid var(--slate-200);
  box-shadow: 0 1px 4px rgba(10,40,100,0.06);
  flex-shrink: 0;
}
.detail-title-wrap { display: flex; align-items: center; gap: 10px; }
.detail-icon { font-size: 22px; }
.detail-name { font-size: 14px; font-weight: 700; color: var(--text-primary); }
.detail-subtitle { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
.detail-actions { display: flex; gap: 10px; }
.btn-ghost {
  font-size: 12px; font-weight: 500; padding: 6px 14px;
  border-radius: 8px; border: 1px solid var(--slate-200);
  background: #fff; color: var(--text-secondary); cursor: pointer;
}
.btn-ghost:hover { border-color: var(--blue-mid); color: var(--blue-mid); background: var(--blue-frost); }
.btn-primary {
  font-size: 12px; font-weight: 600; padding: 6px 14px;
  border-radius: 8px; border: none;
  background: var(--blue-mid); color: #fff; cursor: pointer;
}
.btn-primary:hover { background: #2d6338; }

/* Nav prev/next */
.detail-nav { display: flex; align-items: center; gap: 8px; }
.nav-btn {
  width: 30px; height: 30px; border-radius: 8px;
  border: 1px solid var(--slate-200); background: #fff;
  color: var(--text-secondary); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; transition: all 0.12s;
}
.nav-btn:hover { border-color: var(--blue-mid); color: var(--blue-mid); background: var(--blue-frost); }
.nav-counter { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--text-muted); }

.iframe-wrap { flex: 1; position: relative; }
.dash-iframe {
  width: 100%; height: 100%; border: none; display: block;
}
.iframe-loading {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: var(--slate-50); gap: 12px;
}
.spinner {
  width: 36px; height: 36px; border-radius: 50%;
  border: 3px solid var(--slate-200); border-top-color: var(--blue-mid);
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 12px; color: var(--text-muted); }
.iframe-loading.hidden { display: none; }

/* ─── RESPONSIVE ───────────────────────────────────────────── */

/* ── Mobile topbar: two-row stacked layout ── */
@media (max-width: 640px) {

  /* Topbar becomes a flex column */
  .topbar {
    height: auto !important;
    flex-direction: column;
    align-items: stretch;
    padding: 0;
    gap: 0;
  }

  /* Row 1: logo + brand name */
  .topbar-left {
    padding: 10px 14px 8px;
    gap: 10px;
    align-items: center;
  }
  .brand-name { font-size: 13px; }
  .brand-sub  { display: none; }   /* hide long subtitle on mobile */

  /* Row 2: action buttons */
  .topbar-right {
    display: flex;
    align-items: center;
    padding: 6px 14px 10px;
    gap: 6px;
    border-top: 1px solid rgba(255,255,255,0.07);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .topbar-right::-webkit-scrollbar { display: none; }

  /* Tighten buttons */
  .home-link,
  .back-btn {
    font-size: 11px;
    padding: 5px 10px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .back-btn.visible { display: flex; }

  /* Shrink badge & hide live label text */
  .period-badge { font-size: 10px; padding: 3px 8px; white-space: nowrap; flex-shrink: 0; }
  .live-label   { display: none; }
  .live-dot     { flex-shrink: 0; }

  /* Detail view height: subtract two topbar rows (~88px total) */
  #detail-view { height: calc(100vh - 88px); }

  /* Detail header: stack title and nav/actions vertically */
  .detail-header {
    flex-direction: column;
    align-items: flex-start;
    gap: 8px;
    padding: 10px 14px;
  }
  .detail-header > div:last-child {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .detail-name    { font-size: 13px; }
  .detail-subtitle { display: none; }
  .btn-ghost { font-size: 11px; padding: 5px 10px; }
  .nav-counter { font-size: 10px; }
}

/* ── Tablet / small desktop ── */
@media (max-width: 700px) {
  .card-grid { grid-template-columns: 1fr; }
  #hub-view  { padding: 16px; }
  .hub-stats { flex-wrap: wrap; gap: 14px; }
}
</style>
</head>

let currentIndex = 0;

function buildCards() {
  const grid = document.getElementById('cardGrid');
  dashboards.forEach((d, i) => {
    const card = document.createElement('div');
    card.className = 'dash-card';
    card.onclick = () => openDash(i);
    card.innerHTML = `
      <div class="card-accent" style="background:${d.accent}"></div>
      <div class="card-preview" style="background:${d.bgColor}; color:${d.iconColor}">
        <div class="preview-bg"></div>
        <div class="preview-icon">${d.icon}</div>
        <div class="open-arrow">→</div>
        <div class="preview-kpi-row">
          ${d.kpis.map(k => `
            <div class="mini-kpi">
              <div class="mini-kpi-val">${k.val}</div>
              <div class="mini-kpi-lbl">${k.lbl}</div>
              <div class="mini-delta ${k.dir}">${k.delta}</div>
            </div>
          `).join('')}
        </div>
      </div>
      <div class="card-body">
        <div class="card-number">#${String(d.id).padStart(2,'0')}</div>
        <div class="card-title">${d.title}</div>
        <div class="card-desc">${d.desc}</div>
        <div class="card-tags">${d.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
        <div class="click-prompt">
          <span class="click-prompt-text">Interactive dashboard</span>
          <span class="click-prompt-btn">開啟 Dashboard →</span>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
}

function openDash(index) {
  currentIndex = index;
  const d = dashboards[index];
  document.getElementById('hub-view').style.display = 'none';
  const dv = document.getElementById('detail-view');
  dv.classList.add('visible');
  document.getElementById('backBtn').classList.add('visible');
  document.getElementById('detailIcon').textContent = d.icon;
  document.getElementById('detailName').textContent = d.title;
  document.getElementById('detailSubtitle').textContent = d.subtitle;
  document.getElementById('navCounter').textContent = `${index + 1} / ${dashboards.length}`;
  loadIframe(d.file);
}

function loadIframe(file) {
  const loading = document.getElementById('iframeLoading');
  const iframe = document.getElementById('dashIframe');
  loading.classList.remove('hidden');
  iframe.src = '';
  setTimeout(() => { iframe.src = file; }, 50);
}

function onIframeLoad() {
  document.getElementById('iframeLoading').classList.add('hidden');
}

function showHub() {
  document.getElementById('hub-view').style.display = 'block';
  document.getElementById('detail-view').classList.remove('visible');
  document.getElementById('backBtn').classList.remove('visible');
  document.getElementById('dashIframe').src = '';
}

function navDash(dir) {
  currentIndex = (currentIndex + dir + dashboards.length) % dashboards.length;
  const d = dashboards[currentIndex];
  document.getElementById('detailIcon').textContent = d.icon;
  document.getElementById('detailName').textContent = d.title;
  document.getElementById('detailSubtitle').textContent = d.subtitle;
  document.getElementById('navCounter').textContent = `${currentIndex + 1} / ${dashboards.length}`;
  loadIframe(d.file);
}

function openInTab() {
  const d = dashboards[currentIndex];
  window.open(d.file, '_blank');
}

// Init
buildCards();
</script>
