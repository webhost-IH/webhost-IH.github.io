<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Error Note（錯題本）| 相關文件</title>
<style>
  :root {
    --text: #1c1c1e;
    --muted: #6b6b70;
    --accent: #007aff;
    --border: #e5e5ea;
    --bg-soft: #f7f7f9;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Helvetica Neue", "Segoe UI", sans-serif;
    color: var(--text);
    line-height: 1.75;
    background: #fff;
  }
  .wrap {
    max-width: 720px;
    margin: 0 auto;
    padding: 48px 24px 96px;
  }
  header {
    margin-bottom: 40px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }
  h1 {
    font-size: 28px;
    font-weight: 800;
    margin: 0 0 8px;
  }
  .subtitle {
    color: var(--muted);
    font-size: 15px;
  }
  .links {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .card {
    display: block;
    padding: 20px 24px;
    border: 1px solid var(--border);
    border-radius: 12px;
    text-decoration: none;
    color: var(--text);
    background: var(--bg-soft);
    transition: border-color 0.15s ease;
  }
  .card:hover {
    border-color: var(--accent);
  }
  .card-title {
    font-size: 17px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .card-desc {
    font-size: 14px;
    color: var(--muted);
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Error Note（錯題本）</h1>
    <div class="subtitle">App 相關文件</div>
  </header>
  <div class="links">
    <a class="card" href="./privacy-policy.html">
      <div class="card-title">隱私權政策</div>
      <div class="card-desc">錯題本資料、AI 功能、廣告、訂閱付款的隱私權說明</div>
    </a>
    <a class="card" href="./user-guide.html">
      <div class="card-title">使用說明書</div>
      <div class="card-desc">拍照掃描、錯題管理、複習模式、列印、跨裝置同步等操作說明</div>
    </a>
  </div>
</div>
</body>
</html>
